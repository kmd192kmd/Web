<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        
        table {
            border-collapse: collapse;
        }

        table td{
            border: 1px solid black;
            width: 126px;
            height: 126px;
        }

        table td img {
            display: block;
        }

    </style>
</head>
<body>
    <!-- Problem24_dom.html -->
    <h1></h1>
    
    <table id="tbl1">
        <tr>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
        </tr>
        <tr>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
        </tr>
        <tr>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
        </tr>
        <tr>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
        </tr>
        <tr>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
        </tr>
    </table>

    <script src="https://code.jquery.com/jquery-4.0.0.js"></script>
    <script>
        
        document.querySelectorAll('#tbl1 tr td').forEach(td => {

            td.addEventListener('click', function(e){

                if(this.querySelector('img')) return;

                let img = document.createElement('img');
                img.src = 'images/rect_icon01.png';
                this.appendChild(img);

            });

            td.addEventListener('contextmenu', function(e){

                e.preventDefault();

                if (this.querySelector('img')) return;

                let input = document.createElement('img');
                input.src = 'images/rect_icon02.png';
                this.appendChild(input);

            });

        });

    </script>
</body>
</html>
