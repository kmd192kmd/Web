<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        
        #txt2 {
            border: 0px;
            color: red;
            background-color: white;
            font-weight: 500;
        }

        #txt1 {
            display: block;
        }

        h1 {
            color: #555555;
            user-select: none;
        }

        #form1 {
            color: #555555;
            user-select: none;
        }

    </style>
</head>
<body>
    <!-- Problem1.html --> 
    <h1>회원 가입</h1>
    
    <form name="form1" id="form1">
        아이디:<input type="text" name="txt1" id="txt1">
        <input type="text" name="txt2" id="txt2" disabled>
    </form>
    <script>
        
        var input1 = window.document.form1.txt1;
        var input2 = window.document.form1.txt2;

        input1.onkeyup = m1;

        function m1(event) {
            if(input1.value.length < 4 || input1.value.length > 12){
                input2.value = '아이디가 너무 짧습니다.'
            } else {
                input2.value = '아이디가 적합합니다.'
            }
        }

    </script>
</body>
</html>
