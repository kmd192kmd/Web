<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        
        h1 {
            color: #555555;
        }

        #tbl1 {
            border-collapse: collapse; 
        }

        #tbl1 td {
            border: 1px solid black;
            height: 40px;
        }

        #tbl1 td:nth-child(1){
            width: 100px;
            text-align: center;
            background-color: rgb(214, 214, 214);
        }

        #tbl1 td:nth-child(2){
            width: 450px;
        }

        .txt {
            margin-left: 8px;
            margin-right: 2px;
            width: 400px;
        }

        #txt1 {
            width: 80px;
        }

    </style>
</head>
<body>
    <!-- Problem8_form.html -->
    <h1>우편 번호 검색</h1>
    
    <table id="tbl1">
        <tr>
            <td>우편번호</td>
            <td>
                <input type="text" readonly id="txt1" class="txt" tabindex="-1">
                <button type="button" id="btn1">우편번호검사하기</button>
            </td>
        </tr>
        <tr>
            <td>주소</td>
            <td><input type="text" readonly id="txt2" class="txt" tabindex="-1"></td>
        </tr>
        <tr>
            <td>상세주소</td>
            <td><input type="text" id="txt3" class="txt"></td>
        </tr>
    </table>

    <script src="https://code.jquery.com/jquery-4.0.0.js"></script>
    <script>
        
        document.querySelector("#btn1").addEventListener('click', function(e){

            const w = 500;
            const h = 400;

            const left = (window.screen.width / 2) - (w / 2);
            const top = (window.screen.height / 2) - (h / 2);

            const url = 'http://127.0.0.1:5500/Problem8-1_form.html';
            const options = `width=${w}, height=${h}, top=${top}, left=${left}`;

            window.open(url, 'problemForm', options);

        });

    </script>
</body>
</html>
