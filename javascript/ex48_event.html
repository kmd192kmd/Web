<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box { padding: 30px; margin: 30px; }
        #p1 { background-color: tomato; }
        #p2 { background-color: gold; }
        #p3 { background-color: dodgerblue; }
    </style>
</head>
<body>
    <!-- ex48_event.html -->
    <h1>이벤트</h1>
    
    <div id="p1" class="box">
        할아버지
        <div id="p2" class="box">
            아버지
            <div id="p3" class="box">나</div>
            아버지
        </div>
        할아버지
    </div>

    <hr>

    <input type="text" id="txt1">

    <script>
        
        /* 
        
            이벤트 발생 기전

            이벤트 버블링(Event bubbling): 자식 > 부모
            vs
            이벤트 터널링(Event Tunneling): 부모 > 자식
            이벤트 캡쳐링(Event Capturing)

            **** 자바스크립트는 기본으로 이벤트 버블링을 구현한다.


            이벤트 전파
            1. 부모 > 자식
            1.5 유턴
            2. 자식 > 부모
        
        */

        const p1 = document.getElementById('p1');
        const p2 = document.getElementById('p2');
        const p3 = document.getElementById('p3');

        // p1.onclick = function() {
        //     alert('할아버지');
        // };

        // p2.onclick = function() {
        //     alert('아버지');

        //     event.cancelBubble = true;
        //     event.stopPropagation();
        // };

        // p3.onclick = function() {
        //     alert('나');

        //     //이벤트 버블링 중단
        //     //- 이벤트 전파 중단

        //     event.cancelBubble = true; //비표준(MS)
        //     event.stopPropagation();   //표준
        // };



        //BOM Event
        //- p.onclick
        //- 버블링 구현O, 터널링 구현X

        //DOM Event
        //- p.addEventListener(이벤트, 함수, 전파방식)
        //- 버블링 구현O, 터널링 구현O

        p1.addEventListener('click', function() {
            alert('할아버지');
        });
        p2.addEventListener('click', function() {
            alert('아버지');
        });
        p3.addEventListener('click', function() {
            alert('나');
        });

        p1.addEventListener('click', function() {
            alert('할아버지');
            //event.cancelBubble = true; //동작X
            //event.stopPropagation();
        }, true);
        p2.addEventListener('click', function() {
            alert('아버지');
            //event.stopPropagation();
        }, true);
        p3.addEventListener('click', function() {
            alert('나');
            //event.stopPropagation();
        }, true);



        //전역 이벤트
        window.onkeydown = function(event) {
            if (event.key == 'n') {
                location.href = 'https://naver.com';
            }
        }

        document.getElementById('txt1').onkeydown = function() {
            event.cancelBubble = true;
            event.stopPropagation();
        };


    </script>
</body>
</html>
