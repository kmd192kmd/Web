    <script>
        
        // $('.cats').on('mouseover', function(event){

        //     let num = src.substring(src.lastIndexOf('.') - 2, src.lastIndexOf('.'));

        // });

        //  $('.cats').on('mouseout', function(event){
        //     let src = $(this).attr('src'); 
        //     let num = src.substring(src.lastIndexOf('.') - 2, src.lastIndexOf('.'));
        //     $(this).attr('src', `images/cat${num}.jpg`);
        // });

        document.querySelectorAll('.cats').forEach(img => {

            img.onmouseenter = () => {
                const num = img.src.substring(img.src.lastIndexOf('.') - 2, img.src.lastIndexOf('.'));
                img.src = `images/dog${num}.jpg`;
            };

            img.onmouseleave = () => {
                const num = img.src.substring(img.src.lastIndexOf('.') - 2, img.src.lastIndexOf('.'));
                img.src = `images/cat${num}.jpg`;
            };

        });

    </script>
</body>
