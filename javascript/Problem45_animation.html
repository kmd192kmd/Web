<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        
        body {
            background-color: #f5f5f5;
            text-align: center;
            margin-top: 100px;
        }

        #bird {
            width: 200px;
            height: 140px;
            background-image: url('images/fly.png');
            background-repeat: no-repeat;
            position: relative;
            margin: 0px auto;
            transition: top 0.3s linear;
        }

        h1 {
            color: #666666;
        }

        #div1 {
            color: #666666;
        }

    </style>
</head>
<body>
    <!-- Problem45_animation.html -->
    <h1>새 날개짓</h1>

    <div id="bird"></div>
    <div id="div1">
        새의 속도 : 
        <select id="select1">
            <option value="300">느림</option>
            <option value="100" selected>보통</option>
            <option value="50">빠름</option>
            <option value="10">아주빠름</option>
        </select>
    </div>
    

    <script src="https://code.jquery.com/jquery-4.0.0.js"></script>
    <script>
        
        let timer = null;
        let frame = 0;
        let topPos = 0;
        let speed = 300;
        const bird = document.querySelector('#bird');
        const select1 = document.querySelector('#select1');

        function startAnimation() {
            
            if(timer) clearInterval(timer);

            const speed = parseInt(select1.value);

            timer = setInterval(() => {

                frame = (frame + 1) % 4;
                bird.style.backgroundPosition = `-${frame * 200}px 0px`;

                if(speed == 10){
                    topPos -= 5;
                    bird.style.top = topPos + 'px';
                } else if(speed == 300){
                    topPos += 50;
                    bird.style.top = topPos + 'px';
                }

            }, speed);

        }

        select1.addEventListener('change', startAnimation);

        startAnimation();
        

    </script>
</body>
</html>
