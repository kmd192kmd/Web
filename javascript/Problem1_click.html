<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1 {
            color: rgb(56, 55, 55);
        }
        .txts {
            display: inline-block;
            color: rgb(14, 13, 13);
            margin-bottom: 10px;
        }
        .btns {
            color: rgba(36, 35, 35, 0.877);
            padding: 2px 5px;
        }
        #btn1 {
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <!-- Problem_click.html --> 
    <h1>데이터 입력</h1>
    
    이름: <input type="text" id="txt1" class="txts" size="20"><br>
    나이: <input type="text" id="txt2" class="txts" size="20"><br>
    별명: <input type="text" id="txt3" class="txts" size="20"><br>
    <input type="button" id="btn1" class="btns" value="Long"><input type="button" id="btn2" class="btns" value="Short">

    <script>
        
        var txts = document.querySelectorAll('.txts');

        var btn1 = document.querySelector('#btn1').addEventListener('click', m1);
        var btn2 = document.querySelector('#btn2').addEventListener('click', m2);

        function m1() {
            for(var i=0; i<txts.length; i++){
                txts[i].size = 50;
            }
        }

        function m2() {
             for(var i=0; i<txts.length; i++){
                txts[i].size = 20;
            }
        }

    </script>
</body>
</html>
