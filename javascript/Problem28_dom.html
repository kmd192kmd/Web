<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        table {
            border-collapse: collapse;
            width: 805px;
        }

        table th {
            border: 1px solid white;
            width: 100px;
            height: 30px;
            background-color: #444;
            color: white;
        }

        table td {
            border: 1px solid #999;
            width: 115px;
            height: 100px;
        }

        table td:first-child .no {
            color: tomato;
        }

        table td:last-child .no {
            color: cornflowerblue;
        }

        h1 {
            width: 800px;
            display: flex;
            justify-content: space-between;
        }

    </style>
</head>
<body>
    <!-- Problem28_dom.html -->
    <h1>
        <div id="title"></div>
        <div>
            <button id="prevBtn">이전달</button>
            <button id="nowBtn">이번달</button>
            <button id="nextBtn">다음달</button>
        </div>
    </h1>

    <table>
        <thead>
        <tr>
            <th>SUN</th>
            <th>MON</th>
            <th>TUE</th>
            <th>WED</th>
            <th>THU</th>
            <th>FRI</th>
            <th>SAT</th>
        </tr>
        </thead>
        <tbody></tbody>
    </table>
    

    <script src="https://code.jquery.com/jquery-4.0.0.js"></script>
    <script>
        
        let title = document.querySelector('#title');
        let tbody = document.querySelector('tbody');

        let year;
        let month;

        let now = new Date();
        year = now.getFullYear();
        month = now.getMonth();

        function start(year, month){

            tbody.textContent = '';

            let date = new Date(year, month, 1);

            let lastDate = new Date(year, month + 1, 0).getDate();
            let firstDay = date.getDay();

            title.textContent = `${year}.${month + 1}`;

            let dateCounter = 1;
            let tr = document.createElement('tr');

            for(let i=0; i<firstDay; i++){
                tr.appendChild(document.createElement('td'));
            }

            for(let i=firstDay; dateCounter<=lastDate; i++){
                if(i>0 && i%7 === 0){
                    tbody.appendChild(tr);
                    tr = document.createElement('tr');
                }

                let td = document.createElement('td');

                let span = document.createElement('span');
                span.classList.add('no');
                span.textContent = dateCounter;
                td.appendChild(span);

                for(let j=1; j<=3; j++){
                    let div = document.createElement('div');
                    div.textContent = j === 1 ? '할일' : j === 2 ? '또 할일' : '더 많은 할일';
                    td.appendChild(div);
                }

                tr.appendChild(td);
                dateCounter++;
            }

            tbody.appendChild(tr);

            let remainingCells = (7 - (tbody.lastChild.children.length % 7)) % 7;

            for(let k=0; k<remainingCells; k++){
                let emptyTd = document.createElement('td');
                tbody.lastChild.appendChild(emptyTd);
            }

        }

        start(year, month);

        document.querySelector('#prevBtn').addEventListener('click', function(e){

            month--;
            if(month < 0){
                month = 11;
                year--;
            }
            start(year, month);

        });;

        document.querySelector('#nowBtn').addEventListener('click', function(e){

            now = new Date();
            year = now.getFullYear();
            month = now.getMonth();
            start(year, month);

        });;

        document.querySelector('#nextBtn').addEventListener('click', function(e){

            month++;
            if(month > 11){
                month = 0;
                year++;
            }
            start(year, month);

        });;

    </script>
</body>
</html>
