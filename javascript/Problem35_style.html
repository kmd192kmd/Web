        let x = 0;
        let y = 0;
        let isDown = false;
        let item;

        function createAnimal(type){
            const num = Math.floor(Math.random() * 5) + 1;
            const img = document.createElement('img');
            img.src = `images/${type}0${num}.jpg`;
            img.classList.add('item');

            const holder = document.querySelector('#holder');
            holder.textContent = '';
            holder.appendChild(img);
        };

        window.addEventListener('mousedown', function(e){

            if(e.target.classList.contains('item')){
                isDown = true;
                x = e.offsetX;
                y = e.offsetY;
                item = e.target;

                item.style.position = 'fixed';
                item.style.zIndex = '1000';
            }

        });

        window.addEventListener('mousemove', function(e){

            if(isDown){
                item.style.left = e.clientX - x + 'px';
                item.style.top = e.clientY - y + 'px';

                e.stopPropagation();
                return false;
            }
        });

        window.addEventListener('mouseup', function(e){

            isDown = false;

            let td = getTd(e);

            if(td) {
                if(td.children.length === 0){
                    item.style.position = 'static';
                    item.style.left = '0';
                    item.style.top = '0';
                    td.appendChild(e.target);
                    e.target.classList.remove('item');
                }
            }

        });

        function getTd(e){
            const list = document.elementsFromPoint(e.clientX, e.clientY);
            for(let i=0; i<list.length; i++){
                if(list[i].nodeName === 'TD'){
                    return list[i];
                }
            }
        }

        document.querySelector('#catBtn').addEventListener('click', () => createAnimal('cat'));
        document.querySelector('#dogBtn').addEventListener('click', () => createAnimal('dog'));


    </script>
