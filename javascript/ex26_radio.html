<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

</head>
<body>
    <!-- ex26_radio.html -->
    <h1>라디오 버튼</h1>
    
    <label><input type="radio" name="rb"> 흰색</label>
    <label><input type="radio" name="rb"> 검은색</label>

    <script>
        
        //alert(document.all['rb'].length);

        document.all['rb'][0].onchange = m1;
        function m1() {
            //alert('흰색');
            document.body.bgColor = 'white';
            document.body.style.color = 'black';
        }

        document.all['rb'][1].onchange = m2;
        function m2() {
            //alert('검정색');
            document.body.bgColor = 'black';
            document.body.style.color = 'white';
        }

    </script>
</body>
</html>
