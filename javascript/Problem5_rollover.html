<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        body {
            margin: 25px;
        }
        
        #tbl1 {
            border-collapse: collapse;
        }

        #tbl1 tr td{
            border: 1px solid #999999;
        }

        #tbl1 tr td:nth-child(2){
            width: 400px;
            height: 200px;
            text-align: center;
            vertical-align: middle;
        }
        
        #tbl1 td input {
            display: block;
            margin : 8px 6px;
            width: 120px;
            height: 40px;
            font-weight: bold;
        }

        .dogs {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

    </style>
</head>
<body oncontextmenu='return false' ondragstart='return false' onselectstart='return false'>
    <!-- Problem5_rollover.html -->
    
    <table id="tbl1">
        <tr>
            <td>
                <input type="button" id="btn1" class="btns" value="강아지1">
                <input type="button" id="btn2" class="btns" value="강아지2">
                <input type="button" id="btn3" class="btns" value="강아지3">
                <input type="button" id="btn4" class="btns" value="강아지4">
                <input type="button" id="btn5" class="btns" value="강아지5">
            </td>
            <td>
                <img src="images/dog01.jpg" alt="dog" id="dog">
            </td>
        </tr>
    </table>

    <script src="https://code.jquery.com/jquery-4.0.0.js"></script>
    <script>
        
        const img = document.querySelector('#dog');

        document.querySelectorAll('.btns').forEach(btn => {
            
            let numOnly = btn.id.replace("btn", "");
            let num = numOnly.padStart(2, "0");

            btn.onmouseover = (e) => {
                img.src = `images/dog${num}.jpg`;
            }
            
            btn.addEventListener('click', function(e){
                window.open(`images/dog${num}_big.jpg`
                    , "_blank"
                    , "width=1400, height=1050");
            });
        });

    </script>
</body>
</html>
