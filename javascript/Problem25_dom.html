<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        
        #tbl1 {
            border-collapse: collapse;
            margin: 50px;
        }

        #tbl1 tr td {
            border: 1px solid black;
            width: 100px;
            height: 100px;
        }

        #location {
            background-color: gold;
        }

    </style>
</head>
<body>
    <!-- Problem25_dom.html -->
    
    <table id="tbl1">
        <tr>
            <td id="location"></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
        </tr>
        <tr>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
        </tr>
        <tr>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
        </tr>
        <tr>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
        </tr>
        <tr>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
        </tr>
    </table>

    <script src="https://code.jquery.com/jquery-4.0.0.js"></script>
    <script>
        
        window.addEventListener('keydown', function(e){

            let now = document.querySelector('#location');
            let nowTr = now.parentElement;
            let index = now.cellIndex;
            let target = null;

            if(e.key === 'ArrowRight'){
                target = now.nextElementSibling;
            } else if (e.key === 'ArrowLeft') {
                target = now.previousElementSibling;
            } else if (e.key === 'ArrowDown') {
                if(nowTr.nextElementSibling){
                    target = nowTr.nextElementSibling.cells[index];
                }
            } else if (e.key === 'ArrowUp') {
                if(nowTr.previousElementSibling){
                    target = nowTr.previousElementSibling.cells[index];
                }
            }

            if(target){
                now.id = '';
                target.id = 'location';
            }

        });

    </script>
</body>
</html>
