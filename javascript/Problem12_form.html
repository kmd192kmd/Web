        table tr td:nth-child(1),
        table tr th:nth-child(1){

        table tr td:nth-child(3),
        table tr th:nth-child(3){

        }

            -moz-user-drag: none;

        }

    </style>
</head>
<body>
    <!-- Problem12_form.html -->

    </div>

    <script src="https://code.jquery.com/jquery-4.0.0.js"></script>
    <script>
        
        function toggleLock(num, isLocked){
            const targetInput = document.querySelector(`#input${num}`);
            const targetCheck = document.querySelector(`#checkS${num}`);

            if(targetInput) targetInput.readOnly = isLocked;
            if(targetCheck) targetCheck.checked = isLocked;
        }

        document.querySelectorAll('.check').forEach(check => {

            check.addEventListener('change', function(e){

                const num = this.id.replace('check', '');

                toggleLock(num, this.checked);

            });

        });

        document.querySelectorAll('.input').forEach(input => {

            const num = input.id.replace('input', '');

            input.addEventListener('keydown', function(e){

                if(e.key === 'Enter') toggleLock(num, true);

            });

            input.addEventListener('dblclick', function(e){

                toggleLock(num, false);

            });

        });

    </script>
