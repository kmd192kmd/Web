        window.onkeydown = m3;

        function m3() {
            //F(70), Q(81), C(67)
            //alert(event.keyCode);
            if (event.keyCode == 70) {
                window.location.href = 'https://naver.com';
            } else if (event.keyCode == 81) { 
                window.location.href = 'https://google.com';
            } else if (event.keyCode == 67) {
                window.location.href = 'http://coupang.com';
            }
